# ==============================================================
# SonarQube Analysis Configuration
# ==============================================================

sonar.projectKey=devops-toolchain
sonar.projectName=DevOps Toolchain App
sonar.projectVersion=1.0.0

# Source code
sonar.sources=app/src
sonar.tests=app/tests
sonar.language=py

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate settings
sonar.qualitygate.wait=true

# Exclusions
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/migrations/**
sonar.coverage.exclusions=**/tests/**,**/migrations/**
